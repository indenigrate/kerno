apiVersion: v1
kind: ServiceAccount
metadata:
  name: kerno
  namespace: kerno-system
  labels:
    app.kubernetes.io/name: kerno
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kerno
  labels:
    app.kubernetes.io/name: kerno
rules:
  # Read pods for cgroup → pod mapping.
  - apiGroups: [""]
    resources: ["pods", "nodes"]
    verbs: ["get", "list", "watch"]
  # Read namespaces for enrichment.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kerno
  labels:
    app.kubernetes.io/name: kerno
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kerno
subjects:
  - kind: ServiceAccount
    name: kerno
    namespace: kerno-system
