# Optional: requires Prometheus Operator CRDs.
# Apply only if ServiceMonitor CRD is installed.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kerno
  namespace: kerno-system
  labels:
    app.kubernetes.io/name: kerno
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: kerno
  endpoints:
    - port: metrics
      interval: 15s
      path: /metrics
